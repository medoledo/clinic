{% if patient %}
<form method="POST" id="edit-patient-form" onsubmit="submitEditPatient(event)">
{% else %}
<form method="POST" id="add-patient-form" onsubmit="submitAddPatient(event)">
{% endif %}
    {% csrf_token %}
    {% if patient %}
    <input type="hidden" name="patient_id" value="{{ patient.pk }}" />
    {% endif %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div class="md:col-span-2">
            <label class="form-label">Full Name *</label>
            <input name="name" type="text" required class="form-input" value="{{ patient.name|default:'' }}" placeholder="Patient's full name" />
        </div>
        <div>
            <label class="form-label">Phone Number</label>
            <input name="phone" type="tel" class="form-input" value="{{ patient.phone|default:'' }}" placeholder="e.g. 01012345678" />
        </div>
        <div>
            <label class="form-label">Date of Birth</label>
            <input name="date_of_birth" type="date" class="form-input" id="dob-input" value="{{ patient.date_of_birth|date:'Y-m-d'|default:'' }}" />
            <p id="age-display" class="text-xs text-primary font-semibold mt-1.5" style="display:none"></p>
        </div>
        <div>
            <label class="form-label">Gender *</label>
            <select name="gender" class="form-input">
                <option value="male" {% if not patient or patient.gender == 'male' %}selected{% endif %}>Male</option>
                <option value="female" {% if patient and patient.gender == 'female' %}selected{% endif %}>Female</option>
            </select>
        </div>
        <div class="md:col-span-2">
            <label class="form-label">General Notes</label>
            <textarea name="notes" class="form-textarea !min-h-[72px]" placeholder="Any general notes about this patient">{{ patient.notes|default:'' }}</textarea>
        </div>
    </div>
    <div class="flex gap-3">
        {% if patient %}
        <button type="submit" class="btn btn-primary" id="edit-submit-btn">
            <span id="edit-submit-text">Save Changes</span>
            <span id="edit-submit-spinner" class="hidden spinner"></span>
        </button>
        {% else %}
        <button type="submit" class="btn btn-primary" id="add-submit-btn">
            <span id="add-submit-text">Add Patient</span>
            <span id="add-submit-spinner" class="hidden spinner"></span>
        </button>
        {% endif %}
        <button type="button" onclick="closeModal('{% if patient %}edit{% else %}add{% endif %}-patient-modal')" class="btn btn-secondary">Cancel</button>
    </div>
</form>
<script>
    (function() {
        var dobInput = document.getElementById('dob-input');
        var ageDisplay = document.getElementById('age-display');
        if (!dobInput || !ageDisplay) return;
        function calcAge() {
            var val = dobInput.value;
            if (!val) { ageDisplay.style.display = 'none'; return; }
            var today = new Date();
            var birth = new Date(val);
            var age = today.getFullYear() - birth.getFullYear();
            var m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
            if (age >= 0 && age < 150) {
                ageDisplay.style.display = 'block';
                ageDisplay.textContent = 'Age: ' + age + ' years old';
            }
        }
        dobInput.addEventListener('change', calcAge);
        calcAge();
    })();
</script>
