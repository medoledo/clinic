<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — MediTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #E2E8F0;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            transition: border .2s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, .4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800 flex items-center justify-center p-4">

    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl">
                <svg class="w-9 h-9 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white">MediTrack</h1>
            <p class="text-blue-200 mt-1 text-sm">Doctor Visit Records System</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <h2 class="text-xl font-bold text-gray-900 mb-6">Sign in to your account</h2>

            {% if messages %}
            {% for message in messages %}
            <div class="mb-4 p-3 rounded-lg text-sm font-medium
        {% if message.tags == 'error' %}bg-red-50 border border-red-200 text-red-700
        {% else %}bg-blue-50 border border-blue-200 text-blue-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" id="login-form">
                {% csrf_token %}
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-700 text-gray-500 uppercase tracking-wider mb-1.5"
                            for="username">Username</label>
                        <input id="username" name="username" type="text" required autocomplete="username"
                            class="form-input" placeholder="Enter your username" />
                    </div>
                    <div>
                        <label class="block text-xs font-700 text-gray-500 uppercase tracking-wider mb-1.5"
                            for="password">Password</label>
                        <input id="password" name="password" type="password" required autocomplete="current-password"
                            class="form-input" placeholder="Enter your password" />
                    </div>
                    <div class="flex items-center gap-2">
                        <input id="remember_me" name="remember_me" type="checkbox"
                            class="w-4 h-4 text-blue-600 rounded border-gray-300 cursor-pointer" />
                        <label for="remember_me" class="text-sm text-gray-600 cursor-pointer">Remember me for 30
                            days</label>
                    </div>
                    <button type="submit" id="login-btn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 text-sm mt-2">
                        <span id="btn-text">Sign In</span>
                        <span id="btn-spinner" class="hidden spinner"></span>
                    </button>
                </div>
            </form>
        </div>

        <p class="text-blue-200 text-center text-xs mt-6">© 2026 MediTrack · Secure Medical Records</p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function () {
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            document.getElementById('btn-text').textContent = 'Signing in...';
            document.getElementById('btn-spinner').classList.remove('hidden');
        });
        // Auto-focus username
        document.getElementById('username').focus();
    </script>
</body>

</html>
